<!DOCTYPE html>
<html lang='de'>
    <head>
        <meta charset='utf-8'>
        <meta name='viewport' content='width=device-width,initial-scale=1,user-scalable=no'/>
        <link rel="stylesheet" href="einst.css">
        <title>Venus E - allgemeine Einstellungen</title>
    </head>
    <body>
        <div class='hauptseite'>
            <div>
                <h2>Venus E</h2>
            </div>
            <div class='field'>
                <div class='fieldlabel'>allgemeine Einstellungen</div>
                <form method='post' action='einst'>
                    <div class='taste'>
                        <label for="ntip">Ntp-Server</label>
                        <input id='ntip' placeholder='de.pool.ntp.org' name='ntip' value=''>
                    </div>
                    <div class='taste abstand'>
                        <button name='save' value='ei' type='submit' class='button bgrn'>Speichern</button>
                    </div>
                </form>
            </div>
            <div class='taste abstand'>
                <form class='db' action='einst' method='post'><button>Einstellungen</button></form>
            </div>
            <div class='taste'>
                <form class='db' action='/' method='post'><button>Hauptfenster</button></form>
            </div>
            <div class='imp'>
                <hr/>
                <a class='projekt' href='https://github.com/MartinDienert/Venus2Mqtt' target='_blank'>Venus2Mqtt 0.1 von Martin Dienert</a>
            </div>
        </div>
    </body>
    <script>
        let eB=s=>document.getElementById(s);
        function dho(datei){
            let x=new XMLHttpRequest();
            x.overrideMimeType('application/json');
            x.open('GET','/' + datei,true);
            x.onreadystatechange=()=>{
                if(x.readyState==4&&x.status==200){
                    sD(x.responseText);
                }
            };
            x.send();
        }
        function sD(t){
            od = JSON.parse(t);
            eB('ntip').value=od.NtzIp;
        }
        dho('einst.json');
    </script>
</html>
