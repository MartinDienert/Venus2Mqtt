<!DOCTYPE html>
<html lang='de'>
    <head>
        <meta charset='utf-8'>
        <meta name='viewport' content='width=device-width,initial-scale=1,user-scalable=no'/>
        <link rel="stylesheet" href="einst.css">
        <title>Venus E - Wlan Einstellungen</title>
    </head>
    <body>
        <div class='hauptseite'>
            <div>
                <h2>Venus E</h2>
            </div>
            <div class='field'>
                <div class='fieldlabel'>WLAN-Einstellungen</div>
                <form method='post' action='einst'>
                    <div class='taste'>
                        <label for="wl">aktiviert</label>
                        <input type="checkbox" id="wl" name="wl">
                    </div>
                    <div class='taste'>
                        <label for="id">Netzwerk SSID</label>
                        <input id='id' placeholder='WLAN Netzwerk SSID eingeben' name='ssid' value=''>
                    </div>
                    <div class='taste'>
                        <label for="pw">Passwort</label>
                        <input id='pw' type='password' placeholder='WLAN Passwort eingeben' name='pwd' value=''>
                    </div>
                    <div class='taste abstand'>
                        <button name='save' value='wl' type='submit' class='button bgrn'>Speichern</button>
                    </div>
                    </form>
                </div>
            <div class='taste abstand'>
                <form id=but3 class='db' action='einst' method='post'><button>Einstellungen</button></form>
            </div>
            <div class='taste'>
                <form class='db' action='/' method='post'><button>Hauptfenster</button></form>
            </div>
            <div class='imp'>
                <hr/>
                <a class='projekt' href='https://github.com/MartinDienert/Venus2Mqtt' target='_blank'>Venus2Mqtt 0.1 von Martin Dienert</a>
            </div>
        </div>
    </body>
    <script>
        let eB=s=>document.getElementById(s);
        function dho(datei){
            let x=new XMLHttpRequest();
            x.overrideMimeType('application/json');
            x.open('GET','/' + datei,true);
            x.onreadystatechange=()=>{
                if(x.readyState==4&&x.status==200){
                    sD(x.responseText);
                }
            };
            x.send();
        }
        function sD(t){
            od = JSON.parse(t);
            eB('wl').checked=od.Wlan;
            eB('id').value=od.SSId;
            eB('pw').value=od.PWD;
        }
        dho('einst.json');
    </script>
</html>
