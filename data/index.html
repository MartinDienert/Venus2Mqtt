    </body>
    <script>
        let eB=s=>document.getElementById(s);
        let to;
        function dak(datei){
            clearTimeout(to);
            to=setTimeout(()=>{
                dak(datei);
                dho(datei);
            },3000);
        }
        function dho(datei){
            let x=new XMLHttpRequest();
            x.overrideMimeType('application/json');
            x.open('GET','/' + datei,true);
            x.onreadystatechange=()=>{
                if(x.readyState==4&&x.status==200){
                    sD(x.responseText);
                }
            };
            x.send();
        }
        function sD(t){
            od = JSON.parse(t);
            eB('l1').innerHTML=od.Netz_P;
            eB('l2').innerHTML=od.Batt_P;
            eB('sp').innerHTML=od.Batt_U;
            eB('soc').innerHTML=od.Batt_Soc;
            eB('tp').innerHTML=od.Batt_T;
            eB('egl').innerHTML=od.Tag_E_gel;
            eB('eel').innerHTML=od.Tag_E_ent;
            eB('dt').innerHTML=od.Datum;
            if(od.Datum=='')
                eB('dtd').style.display='none';
            else
                eB('dtd').style.display='flex';
            eB('zt').innerHTML=od.Zeit;
            if(od.Zeit=='')
                eB('ztd').style.display='none';
            else
                eB('ztd').style.display='flex';
        }
        dho('daten.json');
        dak('daten.json');
    </script>
