<!DOCTYPE html>
<html lang='de'>
    <head>
        <meta charset='utf-8'>
        <meta name='viewport' content='width=device-width,initial-scale=1,user-scalable=no'/>
        <link rel="stylesheet" href="einst.css">
        <title>Venus E - Mqtt Einstellungen</title>
    </head>
    <body>
        <div class='hauptseite'>
            <div>
                <h2>Venus E</h2>
            </div>
            <div class='field'>
                <div class='fieldlabel'>MQTT-Einstellungen</div>
                <form method='post' action='einst'>
                    <div class='taste'>
                        <label for="mq" style="margin-left: 5px;">aktiviert</label>
                        <input type="checkbox" id="mq" name="mq">
                    </div>
                    <div class='taste'>
                        <label for="mqsp">spontan</label>
                        <input type="checkbox" id="mqsp" name="mqsp">
                    </div>
                    <div class='taste'>
                        <label for="mqip">Server</label>
                        <input id='mqip' placeholder='MQTT Server eingeben' name='mqip' value=''>
                    </div>
                    <div class='taste'>
                        <label for="mqpo">Server Port</label>
                        <input id='mqpo' placeholder='1883' name='mqpo' value=''>
                    </div>
                    <div class='taste'>
                        <label for="mqbe">Benutzer</label>
                        <input id='mqbe' placeholder='MQTT Benutzer eingeben' name='mqbe' value=''>
                    </div>
                    <div class='taste'>
                        <label for="mqpw">Passwort</label>
                        <input id='mqpw' type='password' placeholder='MQTT Passwort eingeben' name='mqpw' value=''>
                    </div>
                    <div class='taste'>
                        <label for="mqtp">Topic</label>
                        <input id='mqtp' placeholder='Topic eingeben' name='mqtp' value=''>
                    </div>
                    <div class='taste'>
                        <label for="mqiv">Intervall</label>
                        <input id='mqiv' placeholder='Intervall eingeben' name='mqiv' value=''>
                    </div>
                    <div class='taste abstand'>
                        <button name='save' value='mq' type='submit' class='button bgrn'>Speichern</button>
                    </div>
                </form>
            </div>
            <div class='taste abstand'>
                <form id=but3 class='db' action='einst' method='post'><button>Einstellungen</button></form>
            </div>
            <div class='taste'>
                <form class='db' action='/' method='post'><button>Hauptfenster</button></form>
            </div>
            <div class='imp'>
                <hr/>
                <a class='projekt' href='https://github.com/MartinDienert/Venus2Mqtt' target='_blank'>Venus2Mqtt 0.1 von Martin Dienert</a>
            </div>
        </div>
    </body>
    <script>
        let eB=s=>document.getElementById(s);
        function dho(datei){
            let x=new XMLHttpRequest();
            x.overrideMimeType('application/json');
            x.open('GET','/' + datei,true);
            x.onreadystatechange=()=>{
                if(x.readyState==4&&x.status==200){
                    sD(x.responseText);
                }
            };
            x.send();
        }
        function sD(t){
            od = JSON.parse(t);
            eB('mq').checked=od.Mqtt;
            eB('mqsp').checked=od.MqttSp;
            eB('mqip').value=od.MqttIp;
            eB('mqpo').value=od.MqttPo;
            eB('mqbe').value=od.MqttBe;
            eB('mqpw').value=od.MqttPw;
            eB('mqtp').value=od.MqttTp;
            eB('mqiv').value=od.MqttIv;
        }
        dho('einst.json');
    </script>
</html>
